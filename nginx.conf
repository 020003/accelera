server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Reverse proxy to GPU exporter hosts
    # Maps /api-proxy/<host>:<port>/<path> → http://<host>:<port>/<path>
    # Keeps backend IPs out of browser CORS and simplifies firewall rules.
    #
    # SECURITY: Block SSRF to localhost, link-local, and cloud metadata.
    # Only allow requests to hosts on port 5000 (GPU exporter port).
    location ~ ^/api-proxy/([^/]+)/(.*)$ {
        resolver 127.0.0.11 valid=30s;   # Docker embedded DNS
        set $backend $1;
        set $path    $2;

        # ── SSRF protection ──────────────────────────────────────────
        # Block localhost / loopback
        if ($backend ~ ^(localhost|127\.|0\.0\.0\.0|::1|\[::1\])) {
            return 403;
        }
        # Block cloud metadata endpoint
        if ($backend ~ ^169\.254\.) {
            return 403;
        }
        # Block link-local IPv6
        if ($backend ~ ^(\[fe80:|\[fd)) {
            return 403;
        }
        # Only allow GPU exporter port (5000)
        if ($backend !~ :\d+$) {
            return 403;
        }
        if ($backend !~ :5000$) {
            return 403;
        }
        # ─────────────────────────────────────────────────────────────

        proxy_pass http://$backend/$path$is_args$args;

        proxy_set_header Host            $backend;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout    120s;

        # Allow browser to call this without CORS issues
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Central backend API — auth, hosts, settings
    # ${BACKEND_URL} is injected via envsubst at container start.
    location /api/ {
        proxy_pass http://${BACKEND_URL}/api/;

        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # Health check
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
