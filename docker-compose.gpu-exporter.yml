version: "3.8"
services:
  gpu-exporter:
    build:
      context: ./server
    restart: unless-stopped
    ports:
      - "${EXPORTER_PORT:-5000}:5000"
    env_file:
      - path: .env
        required: false
    environment:
      - FLASK_ENV=production
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - PROMETHEUS_ENABLED=${PROMETHEUS_ENABLED:-true}
      - GPU_COLLECT_INTERVAL=${GPU_COLLECT_INTERVAL:-60}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # ── AI Runtime Integration ──
      # Use host.docker.internal to reach services on the Docker host.
      - OLLAMA_URL=http://host.docker.internal:11434
      - SGLANG_URL=http://host.docker.internal:30000
      # If Ollama Prometheus metrics are on a different service/port
      # (e.g. ollama-metrics sidecar), set this explicitly:
      # - OLLAMA_METRICS_URL=http://host.docker.internal:11434/metrics
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # NVIDIA Container Toolkit GPU passthrough
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Share host PID namespace so nvidia-smi/NVML can see host processes
    pid: "host"
    privileged: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /proc:/host/proc:ro
      - accelera-data:/app/data

volumes:
  accelera-data:
