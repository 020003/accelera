version: "3.8"
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    environment:
      - BACKEND_URL=backend:5001
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./server/central
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-}
      - SESSION_LIFETIME_HOURS=${SESSION_LIFETIME_HOURS:-24}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - central-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  gpu-exporter:
    build:
      context: ./server
    restart: unless-stopped
    ports:
      - "${EXPORTER_PORT:-5000}:5000"
    env_file:
      - path: .env
        required: false
    environment:
      - FLASK_ENV=production
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - CORS_ORIGINS=*
      - PROMETHEUS_ENABLED=true
      - GPU_COLLECT_INTERVAL=${GPU_COLLECT_INTERVAL:-60}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OLLAMA_URL=http://host.docker.internal:11434
      - SGLANG_URL=http://host.docker.internal:30000
      - VLLM_URL=http://host.docker.internal:8000
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    pid: "host"
    privileged: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /proc:/host/proc:ro
      - accelera-data:/app/data

volumes:
  accelera-data:
  central-data:
