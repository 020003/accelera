version: "3.8"
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_BACKEND_HOSTS: ${VITE_BACKEND_HOSTS:-}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  gpu-exporter:
    build:
      context: ./server
    restart: unless-stopped
    ports:
      - "${EXPORTER_PORT:-5000}:5000"
    env_file:
      - path: .env
        required: false
    environment:
      - FLASK_ENV=production
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - CORS_ORIGINS=*
      - PROMETHEUS_ENABLED=true
      - GPU_COLLECT_INTERVAL=${GPU_COLLECT_INTERVAL:-60}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    pid: "host"
    privileged: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /proc:/host/proc:ro
      - accelera-data:/app/data

volumes:
  accelera-data:
