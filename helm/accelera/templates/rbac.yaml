{{- if .Values.gpuExporter.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "accelera.fullname" . }}-gpu-exporter
  labels:
    {{- include "accelera.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "accelera.fullname" . }}-gpu-exporter
  labels:
    {{- include "accelera.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "accelera.fullname" . }}-gpu-exporter
subjects:
  - kind: ServiceAccount
    name: {{ include "accelera.gpuExporter.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
