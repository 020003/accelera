{{- if and .Values.gpuExporter.enabled .Values.gpuExporter.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "accelera.fullname" . }}-data
  labels:
    {{- include "accelera.labels" . | nindent 4 }}
    app.kubernetes.io/component: gpu-exporter
spec:
  accessModes:
    {{- toYaml .Values.gpuExporter.persistence.accessModes | nindent 4 }}
  {{- if .Values.gpuExporter.persistence.storageClassName }}
  storageClassName: {{ .Values.gpuExporter.persistence.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.gpuExporter.persistence.size }}
{{- end }}
