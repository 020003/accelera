{{- if .Values.gpuExporter.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "accelera.fullname" . }}-gpu-exporter
  labels:
    {{- include "accelera.labels" . | nindent 4 }}
    app.kubernetes.io/component: gpu-exporter
spec:
  # Headless service — each pod gets its own DNS entry for discovery.
  # With hostNetwork the pods are also reachable at <nodeIP>:5000.
  clusterIP: None
  selector:
    {{- include "accelera.gpuExporter.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      protocol: TCP
{{- end }}
