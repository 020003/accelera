{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "accelera.fullname" . }}-frontend
  labels:
    {{- include "accelera.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "accelera.frontend.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "accelera.labels" . | nindent 8 }}
        {{- include "accelera.frontend.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
      annotations:
        # Force rollout when configmap changes
        checksum/nginx: {{ include (print .Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.frontend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "accelera.imagePullSecrets" . | nindent 6 }}
      {{- with .Values.frontend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: {{ include "accelera.frontend.image" . }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          command: ["/bin/sh", "/etc/nginx/scripts/entrypoint.sh"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          {{- with .Values.frontend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: nginx-conf
              mountPath: /etc/nginx/scripts/entrypoint.sh
              subPath: entrypoint.sh
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "accelera.fullname" . }}-nginx
            defaultMode: 0755
{{- end }}
