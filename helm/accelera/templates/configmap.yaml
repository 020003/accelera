apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "accelera.fullname" . }}-config
  labels:
    {{- include "accelera.labels" . | nindent 4 }}
data:
  FLASK_ENV: {{ .Values.config.flaskEnv | quote }}
  FLASK_HOST: "0.0.0.0"
  FLASK_PORT: "5000"
  CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
  PROMETHEUS_ENABLED: {{ .Values.config.prometheusEnabled | quote }}
  GPU_COLLECT_INTERVAL: {{ .Values.config.gpuCollectInterval | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  NVIDIA_VISIBLE_DEVICES: "all"
  NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
  {{- if .Values.config.ollamaUrl }}
  OLLAMA_URL: {{ .Values.config.ollamaUrl | quote }}
  {{- end }}
  {{- if .Values.config.sglangUrl }}
  SGLANG_URL: {{ .Values.config.sglangUrl | quote }}
  {{- end }}
  {{- if .Values.config.vllmUrl }}
  VLLM_URL: {{ .Values.config.vllmUrl | quote }}
  {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "accelera.fullname" . }}-nginx
  labels:
    {{- include "accelera.labels" . | nindent 4 }}
data:
  entrypoint.sh: |
    #!/bin/sh
    set -e
    # Detect cluster DNS resolver from /etc/resolv.conf at runtime
    RESOLVER=$(awk '/^nameserver/{print $2; exit}' /etc/resolv.conf)
    RESOLVER=${RESOLVER:-10.96.0.10}
    sed -i "s|__KUBE_DNS__|${RESOLVER}|g" /etc/nginx/conf.d/default.conf
    exec nginx -g 'daemon off;'

  default.conf: |
    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options        "SAMEORIGIN" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
        gzip_min_length 256;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Reverse proxy to GPU exporter nodes
        location ~ ^/api-proxy/([^/]+)/(.*)$ {
            resolver __KUBE_DNS__ valid=30s;
            set $backend $1;
            set $path    $2;

            if ($backend ~ ^(localhost|127\.|0\.0\.0\.0|::1|\[::1\])) {
                return 403;
            }
            if ($backend ~ ^169\.254\.) {
                return 403;
            }
            if ($backend ~ ^(\[fe80:|\[fd)) {
                return 403;
            }
            if ($backend !~ :\d+$) {
                return 403;
            }
            if ($backend !~ :5000$) {
                return 403;
            }

            proxy_pass http://$backend/$path$is_args$args;
            proxy_set_header Host            $backend;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout    {{ .Values.config.proxyReadTimeout }};

            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
