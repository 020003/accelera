version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - HOST=0.0.0.0
      - VITE_PORT=8080
      - VITE_API_URL=${VITE_API_URL:-http://localhost:5000}
      - VITE_BACKEND_HOSTS=${VITE_BACKEND_HOSTS:-http://localhost:5000}
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s